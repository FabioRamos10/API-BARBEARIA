# MongoDB (local). Para Atlas ou outro host, sobrescreva em application-local.properties.
spring.data.mongodb.uri=mongodb://localhost:27017/barbearia

# Logging Configuration
logging.level.com.example.barbearia=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Notificações (e-mail). Com perfil "local", use application-local.properties (gitignore) para SMTP real.
# mvn spring-boot:run -Dspring-boot.run.profiles=local
app.mail.from=noreply@barbearia.local
# URL da tela de redefinição (abre no navegador). Ex.: página desta API http://localhost:8080/redefinir-senha.html ou seu front http://localhost:4200/redefinir-senha. Vazio = e-mail com token para POST /auth/reset-password.
app.mail.password-reset-base-url=
# Origens permitidas no CORS (separadas por vírgula) para o front em dev
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:5173
# Admin padrão (criado na 1ª subida se o e-mail ainda não existir). Senha em application-local.properties.
app.seed.admin.enabled=true
app.seed.admin.email=streetbarberold@gmail.com
app.seed.admin.nome=Administrador Street Barber
app.notificacoes.processar-pendentes-ms=120000
app.notificacoes.lembrete-24h-ms=600000
# PIX (cobrança ao finalizar atendimento). Tipo: CPF | TELEFONE | EMAIL | ALEATORIA
app.pix.tipo-chave=CPF
app.pix.chave=06587872174
app.pix.nome=Street Barber
app.pix.cidade=GOIANIA
# Upload de comprovantes (diretório local)
app.upload.dir=uploads
app.api.public-url=http://localhost:8080
# Defina spring.mail.host (e credenciais) para envio real; sem host o bean JavaMailSender não é criado e mensagens ficam FALHA ou só registro conforme fluxo
