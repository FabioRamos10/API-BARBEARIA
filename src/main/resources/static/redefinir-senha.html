<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redefinir senha — Barbearia</title>
  <style>
    :root {
      --bg: #050806;
      --card: rgba(12, 18, 14, 0.92);
      --neon: #39ff14;
      --neon-dim: #7dff9a;
      --muted: #6f8a78;
      --err: #ff4757;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(57, 255, 20, 0.12), transparent 55%),
        radial-gradient(ellipse 80% 50% at 80% 100%, rgba(0, 200, 150, 0.08), transparent 50%),
        var(--bg);
      color: #eafff0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid rgba(57, 255, 20, 0.22);
      border-radius: 14px;
      padding: 28px 26px 26px;
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0 0 22px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(57, 255, 20, 0.25);
      background: rgba(0, 0, 0, 0.35);
      color: #eafff0;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 0 2px rgba(57, 255, 20, 0.2);
    }
    button {
      width: 100%;
      margin-top: 6px;
      padding: 13px 18px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      color: #051005;
      background: linear-gradient(135deg, var(--neon), #00c853);
      box-shadow: 0 0 24px rgba(57, 255, 20, 0.35);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.err {
      display: block;
      background: rgba(255, 71, 87, 0.12);
      border: 1px solid rgba(255, 71, 87, 0.35);
      color: #ffb4bc;
    }
    .msg.ok {
      display: block;
      background: rgba(57, 255, 20, 0.1);
      border: 1px solid rgba(57, 255, 20, 0.35);
      color: var(--neon-dim);
    }
    .hint {
      margin-top: 18px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redefinir senha</h1>
    <p class="sub">Defina uma nova senha para sua conta. O link do e-mail expira em até 1 hora.</p>

    <form id="form" autocomplete="off">
      <label for="nova">Nova senha</label>
      <input id="nova" name="nova" type="password" minlength="6" maxlength="120" required placeholder="Mínimo 6 caracteres" />

      <label for="confirma">Confirmar senha</label>
      <input id="confirma" name="confirma" type="password" minlength="6" maxlength="120" required placeholder="Repita a senha" />

      <button type="submit" id="btn">Salvar nova senha</button>
    </form>

    <div id="feedback" class="msg" role="status"></div>
    <p class="hint" id="noToken" style="display:none;">Este endereço está incompleto (sem token). Abra o link completo que você recebeu por e-mail ou solicite uma nova recuperação de senha.</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get("token");
      var form = document.getElementById("form");
      var btn = document.getElementById("btn");
      var feedback = document.getElementById("feedback");
      var noToken = document.getElementById("noToken");

      function showErr(text) {
        feedback.className = "msg err";
        feedback.textContent = text;
      }
      function showOk(text) {
        feedback.className = "msg ok";
        feedback.textContent = text;
      }

      if (!token || !token.trim()) {
        noToken.style.display = "block";
        form.style.display = "none";
        return;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        feedback.className = "msg";
        feedback.textContent = "";

        var nova = document.getElementById("nova").value;
        var confirma = document.getElementById("confirma").value;
        if (nova !== confirma) {
          showErr("As senhas não coincidem.");
          return;
        }
        if (nova.length < 6) {
          showErr("A senha deve ter pelo menos 6 caracteres.");
          return;
        }

        btn.disabled = true;
        fetch("/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token.trim(), novaSenha: nova })
        })
          .then(function (res) {
            if (res.status === 204) {
              showOk("Senha alterada com sucesso. Você já pode fechar esta aba e entrar com a nova senha.");
              form.reset();
              return null;
            }
            return res.json().catch(function () { return { message: "Não foi possível alterar a senha." }; });
          })
          .then(function (data) {
            if (data && data.message) {
              showErr(data.message);
            }
          })
          .catch(function () {
            showErr("Erro de rede. Tente novamente.");
          })
          .finally(function () {
            btn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
