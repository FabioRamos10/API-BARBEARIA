# Produção — valores sensíveis via variáveis de ambiente (ver deploy/.env.example)

spring.data.mongodb.uri=${MONGODB_URI}

logging.level.com.example.barbearia=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000}
app.cors.allowed-origin-patterns=${APP_CORS_ORIGIN_PATTERNS:}
app.api.public-url=${APP_PUBLIC_URL:http://localhost:8080}
app.mail.from=${APP_MAIL_FROM:noreply@barbearia.local}
app.mail.password-reset-base-url=${APP_PASSWORD_RESET_URL:}

app.seed.admin.enabled=${APP_SEED_ADMIN_ENABLED:true}
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL:admin@barbearia.local}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD:}
app.seed.admin.nome=${APP_SEED_ADMIN_NOME:Administrador}

app.jwt.secret=${JWT_SECRET:}
app.upload.dir=/app/uploads

app.pix.tipo-chave=${APP_PIX_TIPO:CPF}
app.pix.chave=${APP_PIX_CHAVE:}
app.pix.nome=${APP_PIX_NOME:Street Barber}
app.pix.cidade=${APP_PIX_CIDADE:GOIANIA}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}

server.forward-headers-strategy=framework
